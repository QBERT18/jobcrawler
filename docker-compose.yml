# JobCrawler — single Compose stack for local dev AND the self-hosted vServer.
#
# One file, two Docker profiles. Core services (Postgres, Redis, Zookeeper,
# Kafka, the 4 app binaries) always run; the profile only adds the extras:
#
#   Local dev :  docker compose --profile dev  up -d --build
#                → builds the 4 app images from local source + starts the
#                  observability UIs (Elasticsearch, Kibana, RedisInsight).
#
#   Server    :  docker compose --profile prod --env-file .env up -d
#                → pulls prebuilt app images from GHCR + starts ngrok
#                  (public ingress) and Watchtower (push-to-deploy).
#
# Environment-specific values (restart policy, log level, image tag, Postgres
# password, Kafka retention, ES address, crawler debug dump) are env vars with
# dev-friendly defaults — the server's .env overrides them. See .env.example
# and SERVER_SETUP.md.

name: jobcrawler

# Reusable env anchor for the Postgres DSN (depends on POSTGRES_PASSWORD).
x-database-dsn: &database-dsn
  DATABASE_DSN: postgres://jobcrawler:${POSTGRES_PASSWORD:-secret}@postgres:5432/jobcrawler?sslmode=disable

services:

  # ── Infrastructure (always on) ────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: jobcrawler-postgres
    restart: ${RESTART_POLICY:-no}
    environment:
      POSTGRES_DB:       jobcrawler
      POSTGRES_USER:     jobcrawler
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    ports:
      # Bound to localhost: reachable from local Go binaries / SSH tunnel, never
      # the public interface on the server.
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobcrawler -d jobcrawler"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    mem_limit: 512m
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: jobcrawler-redis
    restart: ${RESTART_POLICY:-no}
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    mem_limit: 320m
    networks:
      - backend

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: jobcrawler-zookeeper
    restart: ${RESTART_POLICY:-no}
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
      # Whitelist the 4-letter-word commands used by the healthcheck.
      # Modern cp-zookeeper locks these down by default — without this the
      # healthcheck below would see an empty reply and flap forever.
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,stat,conf,isro"
    ports:
      - "127.0.0.1:2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    healthcheck:
      # ruok → imok handshake, enabled by the whitelist above.
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep -q imok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    mem_limit: 384m
    networks:
      - backend

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: jobcrawler-kafka
    restart: ${RESTART_POLICY:-no}
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      # 9092: external access from the host (local Go binaries / SSH tunnel)
      # 29092: internal Docker network access (used by other containers)
      - "127.0.0.1:9092:9092"
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      # Two listeners: one for internal container-to-container, one for host
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME:       PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "true"
      # Dev keeps 24h; the server lowers this (e.g. 6) to save disk — the queue
      # is transient. Override via KAFKA_LOG_RETENTION_HOURS in .env.
      KAFKA_LOG_RETENTION_HOURS:              ${KAFKA_LOG_RETENTION_HOURS:-24}
      KAFKA_LOG_SEGMENT_BYTES:                1073741824
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    mem_limit: 768m
    networks:
      - backend

  # ── Application services ──────────────────────────────────────────────────────
  # `build` is used locally (`--profile dev up --build`); `image` is pulled on the
  # server (`--profile prod up`). Watchtower watches the labelled containers.

  jobcrawler-api:
    image: ghcr.io/qbert18/jobcrawler-api:${IMAGE_TAG:-latest}
    build:
      context:    .
      dockerfile: docker/api.Dockerfile
    container_name: jobcrawler-api
    restart: ${RESTART_POLICY:-no}
    ports:
      # localhost-only; public access on the server goes through ngrok.
      - "127.0.0.1:8080:8080"
    environment:
      ENV:           ${APP_ENV:-development}
      SERVER_HOST:   "0.0.0.0"
      SERVER_PORT:   "8080"
      <<: *database-dsn
      REDIS_ADDR:    redis:6379
      KAFKA_BROKERS: kafka:29092
      # No colon: an explicit empty value in .env (server) passes through;
      # only an *unset* var falls back to the dev Elasticsearch address.
      ES_ADDRESSES:  ${ES_ADDRESSES-http://elasticsearch:9200}
      OTLP_ENDPOINT: ""
      LOG_LEVEL:     ${LOG_LEVEL:-debug}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    mem_limit: 128m
    networks:
      - backend

  jobcrawler-crawler:
    image: ghcr.io/qbert18/jobcrawler-crawler:${IMAGE_TAG:-latest}
    build:
      context:    .
      dockerfile: docker/crawler.Dockerfile
    container_name: jobcrawler-crawler
    restart: ${RESTART_POLICY:-no}
    environment:
      ENV:            ${APP_ENV:-development}
      <<: *database-dsn
      REDIS_ADDR:     redis:6379
      KAFKA_BROKERS:  kafka:29092
      KAFKA_GROUP_ID: jobcrawler-crawler
      # Diagnostic: dump listing HTML into /debug to inspect selectors.
      # Empty (default) disables it; set to /debug locally to enable.
      CRAWLER_DEBUG_DUMP_DIR: ${CRAWLER_DEBUG_DUMP_DIR:-}
    volumes:
      - ./debug-dumps:/debug
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    mem_limit: 192m
    networks:
      - backend

  jobcrawler-processor:
    image: ghcr.io/qbert18/jobcrawler-processor:${IMAGE_TAG:-latest}
    build:
      context:    .
      dockerfile: docker/processor.Dockerfile
    container_name: jobcrawler-processor
    restart: ${RESTART_POLICY:-no}
    environment:
      ENV:            ${APP_ENV:-development}
      <<: *database-dsn
      REDIS_ADDR:     redis:6379
      KAFKA_BROKERS:  kafka:29092
      KAFKA_GROUP_ID: jobcrawler-processor
      # No colon: explicit empty (server) passes through; unset → dev default.
      ES_ADDRESSES:   ${ES_ADDRESSES-http://elasticsearch:9200}
      # Storage-growth limits (see .env / SERVER_SETUP.md).
      MAX_TOTAL_JOBS:         ${MAX_TOTAL_JOBS:-50000}
      CLEANUP_ENABLED:        ${CLEANUP_ENABLED:-true}
      CLEANUP_SCHEDULE:       ${CLEANUP_SCHEDULE:-0 3 * * *}
      CLEANUP_RETENTION_DAYS: ${CLEANUP_RETENTION_DAYS:-30}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    mem_limit: 192m
    networks:
      - backend

  jobcrawler-scheduler:
    image: ghcr.io/qbert18/jobcrawler-scheduler:${IMAGE_TAG:-latest}
    build:
      context:    .
      dockerfile: docker/scheduler.Dockerfile
    container_name: jobcrawler-scheduler
    restart: ${RESTART_POLICY:-no}
    environment:
      ENV:           ${APP_ENV:-development}
      <<: *database-dsn
      REDIS_ADDR:    redis:6379
      KAFKA_BROKERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    mem_limit: 96m
    networks:
      - backend

  # ── Observability UIs (dev profile only) ──────────────────────────────────────

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: jobcrawler-elasticsearch
    profiles: [dev]
    restart: ${RESTART_POLICY:-no}
    environment:
      discovery.type:            single-node
      xpack.security.enabled:    "false"
      ES_JAVA_OPTS:              "-Xms512m -Xmx512m"
      bootstrap.memory_lock:     "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -v '\"status\":\"red\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - backend

  kibana:
    image: kibana:8.11.0
    container_name: jobcrawler-kibana
    profiles: [dev]
    restart: ${RESTART_POLICY:-no}
    ports:
      - "127.0.0.1:5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - backend

  redisinsight:
    image: redis/redisinsight:latest
    container_name: jobcrawler-redisinsight
    profiles: [dev]
    restart: ${RESTART_POLICY:-no}
    ports:
      - "127.0.0.1:5540:5540"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend

  # ── Public ingress (prod profile only) ────────────────────────────────────────

  ngrok:
    image: ngrok/ngrok:latest
    container_name: jobcrawler-ngrok
    profiles: [prod]
    restart: ${RESTART_POLICY:-no}
    # --pooling-enabled: coexist/load-balance with an existing session on the same
    # endpoint instead of failing with ERR_NGROK_334 when a stale tunnel is still up.
    command: ["http", "jobcrawler-api:8080", "--pooling-enabled", "--log=stdout"]
    ports:
      # ngrok web inspector / local API — http://localhost:4040
      - "4040:4040"
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    depends_on:
      - jobcrawler-api
    networks:
      - backend

  # ── Auto-update (prod profile only) ───────────────────────────────────────────

  watchtower:
    image: containrrr/watchtower:latest
    container_name: jobcrawler-watchtower
    profiles: [prod]
    restart: ${RESTART_POLICY:-no}
    environment:
      WATCHTOWER_CLEANUP:       "true"   # remove old images after updating
      WATCHTOWER_POLL_INTERVAL: "60"     # check GHCR every 60s
      WATCHTOWER_LABEL_ENABLE:  "true"   # only watch labelled containers (the 4 app services)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # GHCR images are public — no registry auth needed. (Do NOT bind-mount
      # ~/.docker/config.json here: if the file is absent Docker silently creates
      # it as a directory, which then breaks the docker CLI. For private images
      # instead mount the dir: `${HOME}/.docker:/config:ro` + DOCKER_CONFIG=/config.)
    networks:
      - backend

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
  es_data:

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  backend:
    driver: bridge
