# JobCrawler — local development stack
# Start everything: docker compose up -d
# Tear down with volumes: docker compose down -v

name: jobcrawler

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: jobcrawler-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       jobcrawler
      POSTGRES_USER:     jobcrawler
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobcrawler -d jobcrawler"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: jobcrawler-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: jobcrawler-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
      # Whitelist the 4-letter-word commands used by the healthcheck.
      # Modern cp-zookeeper locks these down by default — without this the
      # healthcheck below would see an empty reply and flap forever.
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,stat,conf,isro"
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    healthcheck:
      # ruok → imok handshake, enabled by the whitelist above.
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep -q imok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: jobcrawler-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      # 9092: external access from the host (used by local Go binaries)
      # 29092: internal Docker network access (used by other containers)
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      # Two listeners: one for internal container-to-container, one for host
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME:       PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "true"
      KAFKA_LOG_RETENTION_HOURS:              24
      KAFKA_LOG_SEGMENT_BYTES:                1073741824
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - backend

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: jobcrawler-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type:            single-node
      xpack.security.enabled:    "false"
      ES_JAVA_OPTS:              "-Xms512m -Xmx512m"
      bootstrap.memory_lock:     "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -v '\"status\":\"red\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - backend

  # ── Observability UIs ───────────────────────────────────────────────────────

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: jobcrawler-kafka-ui
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME:             local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER:        zookeeper:2181
      DYNAMIC_CONFIG_ENABLED:            "true"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - backend

  kibana:
    image: kibana:8.11.0
    container_name: jobcrawler-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - backend

  redisinsight:
    image: redis/redisinsight:latest
    container_name: jobcrawler-redisinsight
    restart: unless-stopped
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend

  # ── Application services ────────────────────────────────────────────────────

  jobcrawler-api:
    build:
      context:    .
      dockerfile: docker/api.Dockerfile
    container_name: jobcrawler-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ENV:              development
      SERVER_HOST:      "0.0.0.0"
      SERVER_PORT:      "8080"
      DATABASE_DSN:     postgres://jobcrawler:secret@postgres:5432/jobcrawler?sslmode=disable
      REDIS_ADDR:       redis:6379
      KAFKA_BROKERS:    kafka:29092
      ES_ADDRESSES:     http://elasticsearch:9200
      OTLP_ENDPOINT:    ""
      LOG_LEVEL:        debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - backend

  jobcrawler-crawler:
    build:
      context:    .
      dockerfile: docker/crawler.Dockerfile
    restart: unless-stopped
    deploy:
      replicas: 2
    environment:
      ENV:                     development
      DATABASE_DSN:            postgres://jobcrawler:secret@postgres:5432/jobcrawler?sslmode=disable
      REDIS_ADDR:              redis:6379
      KAFKA_BROKERS:           kafka:29092
      KAFKA_GROUP_ID:          jobcrawler-crawler
      # TEMPORARY (Phase A diagnostic): dump listing HTML into /debug so we can
      # inspect what selectors need updating. Unset this env var to disable.
      CRAWLER_DEBUG_DUMP_DIR:  /debug
    volumes:
      - ./debug-dumps:/debug
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

  jobcrawler-processor:
    build:
      context:    .
      dockerfile: docker/processor.Dockerfile
    container_name: jobcrawler-processor
    restart: unless-stopped
    environment:
      ENV:              development
      DATABASE_DSN:     postgres://jobcrawler:secret@postgres:5432/jobcrawler?sslmode=disable
      REDIS_ADDR:       redis:6379
      KAFKA_BROKERS:    kafka:29092
      KAFKA_GROUP_ID:   jobcrawler-processor
      ES_ADDRESSES:     http://elasticsearch:9200
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

  jobcrawler-scheduler:
    build:
      context:    .
      dockerfile: docker/scheduler.Dockerfile
    container_name: jobcrawler-scheduler
    restart: unless-stopped
    environment:
      ENV:              development
      DATABASE_DSN:     postgres://jobcrawler:secret@postgres:5432/jobcrawler?sslmode=disable
      REDIS_ADDR:       redis:6379
      KAFKA_BROKERS:    kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - backend

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
  es_data:

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  backend:
    driver: bridge