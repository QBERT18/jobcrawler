apiVersion: apps/v1
kind: Deployment
metadata:
  name:      jobcrawler-processor
  namespace: jobcrawler
  labels:
    app.kubernetes.io/name:      jobcrawler
    app.kubernetes.io/component: processor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name:      jobcrawler
      app.kubernetes.io/component: processor
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:       1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name:      jobcrawler
        app.kubernetes.io/component: processor
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "9091"
        prometheus.io/path:   "/metrics"
    spec:
      terminationGracePeriodSeconds: 35
      containers:
        - name:  processor
          image: yourorg/jobcrawler-processor:latest
          imagePullPolicy: Always
          ports:
            - name:          metrics
              containerPort: 9091
              protocol:      TCP
          envFrom:
            - configMapRef:
                name: jobcrawler-config
            - secretRef:
                name: jobcrawler-secrets
          env:
            - name:  KAFKA_GROUP_ID
              value: "jobcrawler-processor"
          resources:
            requests:
              memory: "64Mi"
              cpu:    "150m"
            limits:
              memory: "256Mi"
              cpu:    "500m"
          livenessProbe:
            exec:
              command: ["sh", "-c", "exit 0"]
            initialDelaySeconds: 10
            periodSeconds:       30
      securityContext:
        runAsNonRoot: true
        runAsUser:    65534
        runAsGroup:   65534