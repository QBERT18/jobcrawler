apiVersion: apps/v1
kind: Deployment
metadata:
  name:      jobcrawler-api
  namespace: jobcrawler
  labels:
    app.kubernetes.io/name:      jobcrawler
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name:      jobcrawler
      app.kubernetes.io/component: api
  # Rolling update: replace pods one at a time.
  # maxUnavailable: 0 ensures zero-downtime deployments — the old pod is
  # only terminated after the new one passes its readiness probe.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:       1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name:      jobcrawler
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8080"
        prometheus.io/path:   "/metrics"
    spec:
      # Graceful shutdown: Kubernetes waits this many seconds after SIGTERM
      # before sending SIGKILL. Must be >= the shutdown timeout in main.go.
      terminationGracePeriodSeconds: 35
      containers:
        - name:  api
          image: yourorg/jobcrawler-api:latest
          imagePullPolicy: Always
          ports:
            - name:          http
              containerPort: 8080
              protocol:      TCP
          envFrom:
            - configMapRef:
                name: jobcrawler-config
            - secretRef:
                name: jobcrawler-secrets
          resources:
            requests:
              memory: "32Mi"
              cpu:    "100m"
            limits:
              memory: "64Mi"
              cpu:    "200m"
          # Liveness probe: Kubernetes restarts the pod if this fails.
          # Uses the /health endpoint which always returns 200 while the
          # process is alive — no dependency checks.
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds:       10
            timeoutSeconds:      3
            failureThreshold:    3
          # Readiness probe: Kubernetes stops routing traffic to this pod
          # if it fails. /ready checks DB, Redis, and Elasticsearch.
          # During a rolling update, traffic shifts to the new pod only
          # after /ready returns 200.
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds:       10
            timeoutSeconds:      5
            failureThreshold:    3
          # Startup probe: gives the container extra time during cold start
          # before liveness/readiness take over. Prevents premature restarts
          # when the DB migration takes longer than usual.
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds:       5
            failureThreshold:    12  # 12 * 5s = 60s startup window
      securityContext:
        runAsNonRoot: true
        runAsUser:    65534  # nobody
        runAsGroup:   65534