name: Build and push images

# Build all four service images and push them to GitHub Container Registry (GHCR)
# on every push to main. The vServer's Watchtower then auto-pulls :latest and
# restarts the running containers — no manual deploy step.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, crawler, processor, scheduler]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GHCR requires a lowercase owner in the image path.
      - name: Compute lowercase owner
        id: owner
        run: echo "lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      # Booting BuildKit pulls moby/buildkit from Docker Hub, which intermittently
      # times out on the runner (context deadline exceeded). Retry the step so a
      # transient registry blip self-heals instead of failing the deploy.
      - name: Set up Buildx
        uses: Wandalen/wretry.action@v3
        with:
          action: docker/setup-buildx-action@v3
          attempt_limit: 3
          attempt_delay: 10000

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Retry the build/push too — it pulls base images from Docker Hub and pushes
      # to GHCR, both of which can hit the same transient registry timeouts.
      - name: Build and push ${{ matrix.service }}
        uses: Wandalen/wretry.action@v3
        with:
          action: docker/build-push-action@v6
          attempt_limit: 3
          attempt_delay: 10000
          with: |
            context: .
            file: docker/${{ matrix.service }}.Dockerfile
            push: true
            tags: ghcr.io/${{ steps.owner.outputs.lc }}/jobcrawler-${{ matrix.service }}:latest,ghcr.io/${{ steps.owner.outputs.lc }}/jobcrawler-${{ matrix.service }}:${{ github.sha }}
            cache-from: type=gha,scope=${{ matrix.service }}
            cache-to: type=gha,mode=max,scope=${{ matrix.service }}
