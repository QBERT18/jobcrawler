<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>JobCrawler — Jobs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    [x-cloak] { display: none; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">
  <div class="mx-auto max-w-6xl px-4 py-8">

    <!-- Header -->
    <header class="mb-6 flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-semibold tracking-tight">JobCrawler</h1>
        <p id="summary" class="text-sm text-slate-500">Loading&hellip;</p>
      </div>
    </header>

    <!-- Filters -->
    <section class="mb-6 rounded-lg border border-slate-200 bg-white p-4 shadow-sm">
      <form id="filter-form" class="grid grid-cols-1 gap-3 sm:grid-cols-12">

        <div class="sm:col-span-6">
          <label class="mb-1 block text-xs font-medium text-slate-600">Search</label>
          <input type="text" name="q" placeholder="e.g. golang, devops, mercedes"
                 class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" />
        </div>

        <div class="sm:col-span-3">
          <label class="mb-1 block text-xs font-medium text-slate-600">Location</label>
          <input type="text" name="location" placeholder="Berlin, Hamburg&hellip;"
                 class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" />
        </div>

        <div class="sm:col-span-3">
          <label class="mb-1 block text-xs font-medium text-slate-600">Remote</label>
          <select name="remote"
                  class="w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
            <option value="">Any</option>
            <option value="FULL">Full remote</option>
            <option value="PARTIAL">Partial / hybrid</option>
            <option value="NONE">On-site only</option>
          </select>
        </div>

        <div class="sm:col-span-5">
          <label class="mb-1 block text-xs font-medium text-slate-600">Tags (comma separated)</label>
          <input type="text" name="tags" placeholder="golang,kubernetes,java"
                 class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" />
        </div>

        <div class="sm:col-span-3">
          <label class="mb-1 block text-xs font-medium text-slate-600">Source</label>
          <select name="source" multiple size="4"
                  class="w-full rounded-md border border-slate-300 bg-white px-3 py-1 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
            <option value="STEPSTONE">Stepstone</option>
            <option value="XING">Xing</option>
            <option value="INDEED">Indeed</option>
            <option value="LINKEDIN">LinkedIn</option>
          </select>
        </div>

        <div class="sm:col-span-2">
          <label class="mb-1 block text-xs font-medium text-slate-600">Min salary (€)</label>
          <input type="number" name="salary_min" min="0" step="1000" placeholder="0"
                 class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" />
        </div>

        <div class="sm:col-span-2">
          <label class="mb-1 block text-xs font-medium text-slate-600">Sort</label>
          <select name="sort"
                  class="w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
            <option value="published_at:desc">Newest first</option>
            <option value="published_at:asc">Oldest first</option>
            <option value="created_at:desc">Recently crawled</option>
          </select>
        </div>

        <div class="flex items-end gap-2 sm:col-span-12">
          <button type="submit"
                  class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-1">
            Apply filters
          </button>
          <button type="button" id="reset-btn"
                  class="rounded-md border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">
            Reset
          </button>
          <div class="ml-auto flex items-center gap-2 text-xs text-slate-500">
            <label for="per-page">Per page</label>
            <select id="per-page" name="per_page"
                    class="rounded-md border border-slate-300 bg-white px-2 py-1 text-xs focus:outline-none">
              <option>10</option>
              <option selected>25</option>
              <option>50</option>
              <option>100</option>
            </select>
          </div>
        </div>
      </form>
    </section>

    <!-- Results -->
    <section id="results" class="space-y-3"></section>

    <!-- Pagination -->
    <nav id="pagination" class="mt-6 flex items-center justify-between text-sm"></nav>

  </div>

  <template id="card-tpl">
    <article class="rounded-lg border border-slate-200 bg-white p-4 shadow-sm transition hover:shadow-md">
      <div class="flex items-start justify-between gap-4">
        <div class="min-w-0">
          <a class="block text-base font-semibold text-indigo-700 hover:underline" data-field="title-link" target="_blank" rel="noopener noreferrer"></a>
          <p class="mt-0.5 truncate text-sm text-slate-700" data-field="company"></p>
          <p class="text-xs text-slate-500" data-field="location"></p>
        </div>
        <div class="flex flex-col items-end gap-1">
          <span class="rounded-full bg-slate-100 px-2 py-0.5 text-[10px] font-medium uppercase tracking-wide text-slate-600" data-field="source"></span>
          <span class="rounded-full px-2 py-0.5 text-[10px] font-medium uppercase tracking-wide" data-field="remote"></span>
        </div>
      </div>
      <p class="mt-3 line-clamp-3 text-sm text-slate-600" data-field="description"></p>
      <div class="mt-3 flex flex-wrap gap-1" data-field="tags"></div>
      <div class="mt-3 flex items-center justify-between text-[11px] text-slate-400">
        <span data-field="salary"></span>
        <span data-field="published"></span>
      </div>
    </article>
  </template>

  <script>
    // Served same-origin from the API, so all requests are relative — this works
    // unchanged behind ngrok/any reverse proxy with no mixed-content issues.
    const API_BASE = '';

    const form        = document.getElementById('filter-form');
    const perPageSel  = document.getElementById('per-page');
    const results     = document.getElementById('results');
    const pagination  = document.getElementById('pagination');
    const summaryEl   = document.getElementById('summary');
    const cardTpl     = document.getElementById('card-tpl');

    let currentPage = 1;

    function currentFilters() {
      const fd = new FormData(form);
      const params = new URLSearchParams();

      const q          = (fd.get('q') || '').trim();
      const location   = (fd.get('location') || '').trim();
      const remote     = fd.get('remote') || '';
      const tags       = (fd.get('tags') || '').trim();
      const salaryMin  = fd.get('salary_min') || '';
      const sort       = fd.get('sort') || '';
      const sources    = fd.getAll('source');

      if (q)         params.set('q', q);
      if (location)  params.set('location', location);
      if (remote)    params.set('remote', remote);
      if (tags)      params.set('tags', tags);
      if (salaryMin) params.set('salary_min', salaryMin);
      if (sort)      params.set('sort', sort);
      if (sources.length) params.set('source', sources.join(','));

      params.set('page', String(currentPage));
      params.set('per_page', perPageSel.value);
      return params;
    }

    function remoteBadgeClass(remote) {
      switch (remote) {
        case 'FULL':    return 'bg-emerald-100 text-emerald-700';
        case 'PARTIAL': return 'bg-amber-100 text-amber-700';
        case 'NONE':    return 'bg-slate-100 text-slate-600';
        default:        return 'bg-slate-100 text-slate-600';
      }
    }

    function formatSalary(j) {
      if (!j.SalaryMin && !j.SalaryMax) return '';
      const cur = j.SalaryCurrency || '€';
      if (j.SalaryMin && j.SalaryMax) return `${cur} ${j.SalaryMin.toLocaleString()} – ${j.SalaryMax.toLocaleString()}`;
      if (j.SalaryMin) return `${cur} ${j.SalaryMin.toLocaleString()}+`;
      return `${cur} up to ${j.SalaryMax.toLocaleString()}`;
    }

    function formatDate(iso) {
      if (!iso) return '';
      const t = new Date(iso);
      if (Number.isNaN(t.getTime()) || t.getFullYear() < 2000) return '';
      return t.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function renderCard(job) {
      const node = cardTpl.content.cloneNode(true);
      const link = node.querySelector('[data-field="title-link"]');
      link.textContent = job.Title || '(untitled)';
      link.href = job.URL || '#';

      node.querySelector('[data-field="company"]').textContent  = job.Company?.Name || '';
      node.querySelector('[data-field="location"]').textContent = job.Location?.City || '';
      node.querySelector('[data-field="source"]').textContent   = job.Source || '';

      const rem = node.querySelector('[data-field="remote"]');
      rem.textContent = job.Remote || '';
      rem.className += ' ' + remoteBadgeClass(job.Remote);

      const desc = (job.Description || '').replace(/\s+/g, ' ').trim();
      node.querySelector('[data-field="description"]').textContent = desc.slice(0, 320);

      const tagsEl = node.querySelector('[data-field="tags"]');
      (job.Tags || []).slice(0, 12).forEach(t => {
        const chip = document.createElement('span');
        chip.className = 'rounded bg-indigo-50 px-2 py-0.5 text-[11px] font-medium text-indigo-700';
        chip.textContent = t;
        tagsEl.appendChild(chip);
      });

      node.querySelector('[data-field="salary"]').textContent    = formatSalary(job);
      node.querySelector('[data-field="published"]').textContent = formatDate(job.PublishedAt) || ('crawled ' + formatDate(job.CreatedAt));

      return node;
    }

    function renderPagination(total, page, perPage, totalPages) {
      pagination.innerHTML = '';
      if (!total) return;

      const info = document.createElement('span');
      info.className = 'text-slate-500';
      const from = (page - 1) * perPage + 1;
      const to   = Math.min(page * perPage, total);
      info.textContent = `Showing ${from}–${to} of ${total}`;
      pagination.appendChild(info);

      const btns = document.createElement('div');
      btns.className = 'flex items-center gap-2';

      const prev = document.createElement('button');
      prev.textContent = '← Prev';
      prev.className = 'rounded-md border border-slate-300 bg-white px-3 py-1.5 text-sm hover:bg-slate-50 disabled:opacity-40 disabled:cursor-not-allowed';
      prev.disabled = page <= 1;
      prev.addEventListener('click', () => { currentPage = page - 1; fetchAndRender(); });

      const pageInfo = document.createElement('span');
      pageInfo.className = 'text-slate-600';
      pageInfo.textContent = `Page ${page} / ${totalPages || 1}`;

      const next = document.createElement('button');
      next.textContent = 'Next →';
      next.className = 'rounded-md border border-slate-300 bg-white px-3 py-1.5 text-sm hover:bg-slate-50 disabled:opacity-40 disabled:cursor-not-allowed';
      next.disabled = page >= totalPages;
      next.addEventListener('click', () => { currentPage = page + 1; fetchAndRender(); });

      btns.append(prev, pageInfo, next);
      pagination.appendChild(btns);
    }

    function renderError(msg) {
      results.innerHTML = '';
      const box = document.createElement('div');
      box.className = 'rounded-md border border-red-200 bg-red-50 p-4 text-sm text-red-700';
      box.textContent = msg;
      results.appendChild(box);
    }

    function renderEmpty() {
      results.innerHTML = '';
      const box = document.createElement('div');
      box.className = 'rounded-md border border-slate-200 bg-white p-8 text-center text-slate-500';
      box.textContent = 'No jobs match your filters.';
      results.appendChild(box);
    }

    async function fetchAndRender() {
      results.setAttribute('aria-busy', 'true');
      summaryEl.textContent = 'Loading…';
      const url = `${API_BASE}/api/v1/jobs?${currentFilters().toString()}`;

      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`API returned ${res.status}`);
        const data = await res.json();

        const jobs = data.jobs || [];
        summaryEl.textContent = `${data.total ?? jobs.length} jobs in index`;

        if (!jobs.length) {
          renderEmpty();
        } else {
          results.innerHTML = '';
          const frag = document.createDocumentFragment();
          jobs.forEach(j => frag.appendChild(renderCard(j)));
          results.appendChild(frag);
        }

        renderPagination(data.total || 0, data.page || 1, data.per_page || Number(perPageSel.value), data.total_pages || 0);
      } catch (err) {
        renderError(`Couldn't load jobs. ${err.message}`);
        summaryEl.textContent = 'Offline';
      } finally {
        results.removeAttribute('aria-busy');
      }
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      currentPage = 1;
      fetchAndRender();
    });

    perPageSel.addEventListener('change', () => { currentPage = 1; fetchAndRender(); });

    document.getElementById('reset-btn').addEventListener('click', () => {
      form.reset();
      currentPage = 1;
      fetchAndRender();
    });

    fetchAndRender();
  </script>
</body>
</html>
